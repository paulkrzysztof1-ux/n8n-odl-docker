services:
  odl:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: odl-hybrid
    restart: unless-stopped
    expose:
      - "5002"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
